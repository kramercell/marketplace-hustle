<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Come by for a garage beer?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #00ff41;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 20px;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  #status-bar {
    background: #001a00;
    border-bottom: 1px solid #00ff41;
    padding: 6px 12px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    font-family: 'VT323', monospace;
    font-size: 24px;
    flex-shrink: 0;
  }

  .stat { color: #00cc33; }
  .stat span { color: #00ff41; }
  .stat .warn { color: #ffaa00; }
  .stat .danger { color: #ff3333; }
  .stat .good { color: #00ffaa; }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    line-height: 1.6;
    scroll-behavior: smooth;
  }

  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: #001100; }
  #output::-webkit-scrollbar-thumb { background: #00aa22; }

  .line { margin: 2px 0; }
  .line.system { color: #00aa22; }
  .line.event { color: #ffdd00; }
  .line.griffin { color: #ff6600; }
  .line.rally { color: #00ccff; }
  .line.money { color: #00ffaa; }
  .line.error { color: #ff4444; }
  .line.title { color: #00ff41; font-family: 'VT323', monospace; font-size: 22px; }
  .line.dim { color: #006600; }
  .line.prompt-echo { color: #88ff88; }
  .line.win { color: #ffff00; font-family: 'VT323', monospace; font-size: 24px; }
  .line.lose { color: #ff2222; font-family: 'VT323', monospace; font-size: 22px; }
  .line.special { color: #ff44ff; }
  .line.beer { color: #ffcc00; }
  .line.choice { color: #00ffff; }

  #input-area {
    border-top: 1px solid #00ff41;
    background: #001a00;
    padding: 8px 12px;
    display: none;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  #prompt-label {
    color: #00ff41;
    font-family: 'VT323', monospace;
    font-size: 26px;
    white-space: nowrap;
  }

  #cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #00ff41;
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    caret-color: #00ff41;
  }

  #cmd-input::selection { background: #004400; }

  .ascii-art {
    color: #00ff41;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.2;
    white-space: pre;
  }

  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  @keyframes drunkNeighbor {
    0%   { filter: none; }
    6%   { filter: hue-rotate(100deg) saturate(3) brightness(1.4); }
    14%  { filter: hue-rotate(220deg) saturate(2) brightness(0.7); }
    24%  { filter: hue-rotate(300deg) saturate(4) brightness(1.3); }
    36%  { filter: hue-rotate(160deg) saturate(2.5) brightness(1.1); }
    50%  { filter: hue-rotate(80deg) saturate(2); }
    66%  { filter: hue-rotate(40deg) saturate(1.5); }
    82%  { filter: hue-rotate(15deg) saturate(1.2); }
    100% { filter: none; }
  }
  body.drunk-mode { animation: drunkNeighbor 3.5s ease-out forwards; }

  @keyframes flashDanger {
    0%,100% { opacity: 1; }
    50% { opacity: 0.1; }
  }
  .flash-danger { animation: flashDanger 0.6s step-end infinite; color: #ff3333 !important; }

  @keyframes redFlash {
    0%   { filter: none; }
    12%  { filter: brightness(1.6) saturate(4) sepia(1) hue-rotate(-15deg); }
    30%  { filter: brightness(1.3) saturate(3) sepia(0.7) hue-rotate(-8deg); }
    60%  { filter: brightness(1.1) saturate(2) sepia(0.3); }
    100% { filter: none; }
  }
  body.red-flash-mode { animation: redFlash 1.2s ease-out forwards; }

  .bar-fill {
    display: inline-block;
    background: #00ff41;
    height: 10px;
    vertical-align: middle;
  }
  .bar-empty {
    display: inline-block;
    background: #003300;
    height: 10px;
    vertical-align: middle;
  }

  #yt-dock {
    position: fixed;
    top: 44px;
    right: 10px;
    z-index: 500;
    border: 1px solid #00ff41;
    background: #000;
    box-shadow: 0 0 8px rgba(0,255,65,0.3);
  }
  @media (max-width: 768px) {
    #yt-dock {
      position: static;
      border-left: none;
      border-right: none;
      border-top: none;
      box-shadow: none;
    }
  }
  #yt-label {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: #00ff41;
    padding: 3px 8px;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  #yt-label:hover { background: #001a00; }
  #yt-frame { display: block; }
  #yt-dock.collapsed #yt-frame { height: 0; }
  #yt-dock.collapsed { border-bottom: none; }

  /* ── Quick-action button panel ─────────────────────────── */
  #btn-panel {
    background: #001200;
    border-top: 1px solid #003300;
    padding: 6px 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    flex-shrink: 0;
    align-items: flex-start;
    align-content: flex-start;
    min-height: 52px;
  }
  .game-btn {
    background: transparent;
    border: 1px solid #00aa22;
    color: #00cc33;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 7px 13px;
    cursor: pointer;
    white-space: nowrap;
    touch-action: manipulation;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    line-height: 1.3;
  }
  .game-btn:hover  { background: #002200; color: #00ff41; border-color: #00ff41; }
  .game-btn:active { background: #003300; }
  .game-btn.btn-primary   { border-color: #00ff41; color: #00ff41; }
  .game-btn.btn-event     { border-color: #ff6600; color: #ff6600; animation: blink 0.8s step-end infinite; }
  .game-btn.btn-choice    { border-color: #00ccff; color: #00ccff; }
  .game-btn.btn-sell      { border-color: #00ffaa; color: #00ffaa; }
  .game-btn.btn-beer      { border-color: #ffcc00; color: #ffcc00; }
  .game-btn.btn-back      { border-color: #444;    color: #555;    font-size: 12px; }
  .game-btn.btn-listing   { border-color: #009900; color: #00bb22; text-align: left; }
  .game-btn.btn-buy       { border-color: #00ffaa; color: #00ffaa; }
  .game-btn.btn-negotiate { border-color: #ffdd00; color: #ffdd00; }
  .game-btn.btn-lowball   { border-color: #ff6600; color: #ff6600; }
  .game-btn.btn-next      { border-color: #444;    color: #666;    }
  .game-btn.btn-upgrade   { border-color: #ff44ff; color: #ff44ff; animation: blink 0.6s step-end infinite; }
  @media (max-width: 768px) {
    /* Status bar: 3-column grid so stats don't stack 4 rows deep */
    #status-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      font-size: 16px;
      gap: 2px 6px;
      padding: 4px 8px;
    }

    /* Output: clip horizontal overflow from wide box-art lines */
    #output {
      overflow-x: hidden;
      padding: 8px 10px;
      font-size: 16px;
    }

    /* ASCII title art is unreadable at phone width — hide it */
    .ascii-art { display: none; }

    /* Buttons: bigger tap targets, panel capped so it doesn't eat the screen */
    .game-btn { font-size: 15px; padding: 11px 16px; }
    #btn-panel {
      padding: 8px;
      gap: 8px;
      max-height: 42vh;
      overflow-y: auto;
    }
  }

</style>
</head>
<body>

<div id="status-bar">
  <div class="stat">WEEK: <span id="s-week">1</span>/<span id="s-total">5</span></div>
  <div class="stat">💰 CASH: $<span id="s-money">500</span></div>
  <div class="stat">🍺 BUD LIGHTS: <span id="s-beer">6</span></div>
  <div class="stat">⚡ ENERGY: <span id="s-energy">100</span>%</div>
  <div class="stat">🎉 RALLY PREP: <span id="s-rally">0</span>%</div>
  <div class="stat">📦 INVENTORY: <span id="s-inv">0</span> items</div>
</div>

<div id="yt-dock" class="collapsed">
  <div id="yt-label" onclick="toggleYT()">🎵 SOUNDTRACK ▶</div>
  <iframe id="yt-frame" width="220" height="124" frameborder="0"
    allow="autoplay; encrypted-media; fullscreen"
    allowfullscreen></iframe>
</div>

<div id="output"></div>

<div id="btn-panel"></div>

<div id="input-area">
  <div id="prompt-label">MATT&gt;</div>
  <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus placeholder="type 'help' for commands...">
</div>

<script>
// ============================================================
//  GAME DATA
// ============================================================

const ITEMS = [
  { id:'atv',        name:'ATV',                    buyMin:800,  buyMax:2000, sellMin:1400, sellMax:3200, emoji:'🏍️' },
  { id:'sxs',        name:'Side-by-Side',            buyMin:3000, buyMax:7000, sellMin:5500, sellMax:11000, emoji:'🚙' },
  { id:'scooter',    name:'Scooter',                 buyMin:150,  buyMax:600,  sellMin:300,  sellMax:900,  emoji:'🛵' },
  { id:'boat',       name:'Bass Boat',               buyMin:2500, buyMax:8000, sellMin:4500, sellMax:14000,emoji:'⛵' },
  { id:'bbq',        name:'BBQ Grill',               buyMin:40,   buyMax:250,  sellMin:80,   sellMax:450,  emoji:'🍖' },
  { id:'golf',       name:'Golf Club Set',           buyMin:50,   buyMax:300,  sellMin:100,  sellMax:550,  emoji:'⛳' },
  { id:'yeti',       name:'Yeti Cooler',             buyMin:80,   buyMax:350,  sellMin:175,  sellMax:600,  emoji:'🧊' },
  { id:'mower',      name:'Zero-Turn Mower',         buyMin:500,  buyMax:1800, sellMin:900,  sellMax:3000, emoji:'🌿' },
  { id:'kayak',      name:'Kayak',                   buyMin:100,  buyMax:400,  sellMin:200,  sellMax:700,  emoji:'🚣' },
  { id:'trailer',    name:'Utility Trailer',         buyMin:300,  buyMax:900,  sellMin:600,  sellMax:1600, emoji:'🚚' },
];

const RECALLED_YETI = {
  id:'yeti_recalled', name:'Yeti Cooler (MAGNETIC SEAL - RECALLED!!!)', buyMin:30, buyMax:60,
  sellMin:700, sellMax:1200, emoji:'🧊', special:true
};

const YYT_SONGS = [
  '"Wait (The Whisper Song)"', '"Shake"', '"Whistle While You Twerk"',
  '"Salt Shaker"', '"Georgia Dome"', '"Get Low"', '"Halftime (Stand Up and Get Crunk)"',
  '"Naggin\'"', '"Say I Yi Yi"', '"Dangerous"'
];

const SARCASTIC_CALM = [
  'GRIFFIN. BUDDY. That man is just WALKING. He\'s allowed to DO that.',
  'Griffin, I swear on every Bud Light in this cooler, CHILL OUT.',
  'GRIFFIN! He\'s just checking his mail! It\'s not a federal crime!',
  'Griffin, he\'s a NEIGHBOR. We\'ve SEEN him for SIX YEARS. SIX.',
  'Oh sure Griffin, bark at the WIND while you\'re at it.',
  'Griffin! That\'s Dave! You KNOW Dave! ...He clearly doesn\'t know Dave.',
  'GRIFFIN SIT. ...He\'s not sitting. He never sits.',
  'Griffin, I am trying to make MONEY here. Please. I am BEGGING you.',
  'GRIFF. Buddy. She\'s just a lady with a stroller. A STROLLER.',
  'Griffin, on behalf of the entire neighborhood, I apologize. ...He doesn\'t care.',
];

const FIREWORKS_ANSWERS = [
  'That\'s a great question. Moving on.',
  'They will happen. This has been confirmed. The rest is details.',
  'You know, time is kind of a construct when you really think about it.',
  'Before breakfast? After dinner? The answer lies somewhere in that range.',
  'I forwarded your question to the fireworks. They said they\'d let you know.',
  'There\'s a schedule. It\'s on the flyer. I\'m not the flyer.',
  'When they\'re ready. They\'re professionals. They have a whole process.',
  'Same time as last year. ...You don\'t remember last year, do you.',
  'At some point after the boats get going. Probably. Directionally.',
  'The concept of "when" is something we\'re still workshopping. Stay tuned.',
];

const OTHER_RALLY_QUESTIONS = [
  { q: 'Is the Ying Yang Twins theme confirmed?', a: 'Yes. It is confirmed. It has been confirmed. It will remain confirmed.' },
  { q: 'Can I bring my jet ski even though I don\'t have a boat?', a: 'It\'s a BOAT rally. BOAT. The word is right there.' },
  { q: 'What if it rains?', a: 'Then we get wet. Just like every other time it rains.' },
  { q: 'Are kids allowed?', a: 'It\'s a neighborhood event. Kids live in the neighborhood. So yes.' },
  { q: 'Will there be food?', a: 'I have a BBQ. You have a mouth. I think we can work something out.' },
  { q: 'Can I bring my cousin from out of town?', a: 'Sure. As long as they don\'t ask me about fireworks.' },
  { q: 'Is there a dress code?', a: 'Basketball shorts are acceptable. Kirkland slides encouraged.' },
  { q: 'Who\'s in charge of the music?', a: 'The Ying Yang Twins. Essentially. Their discography.' },
  { q: 'Will the Ying Yang Twins actually be there?', a: 'Not if I don\'t make enough money to make it worth their while, no.' },
  { q: 'What time does it start?', a: 'The flyer says 4pm. The flyer that I sent. To everyone. Twice.' },
];

// ============================================================
//  GAME STATE
// ============================================================
const G = {
  week: 1,
  totalWeeks: 5,
  money: 500,
  budLights: 6,
  energy: 100,
  rallyPrep: 0,
  inventory: [],    // {id, name, paidPrice, emoji, special}
  listings: [],     // current marketplace listings
  pendingEvent: null, // {type:'griffin'} or {type:'rally', q, a} or {type:'fireworks'}
  totalProfit: 0,
  startMoney: 500,
  foundRecalled: false,
  rallyOrganized: false,
  griffinCalmAttempts: 0,
  questionsAnswered: 0,
  beersDrunk: 0,
  biteMeter: 0,       // 0-100, increases when Griffin is not calmed
  yetiUpgraded: false,
  carHonkSeen: false,
  trueLimeUsed: false,
  crockettSeen: false,
  tigerWoodsSeen: false,
  weeklyPrepGained: 0,
  phase: 'playing', // 'playing','won','lost'
  currentSong: YYT_SONGS[Math.floor(Math.random()*YYT_SONGS.length)],
  actionsTaken: 0,
  maxActionsPerWeek: 10,
};

// ============================================================
//  UTILITY
// ============================================================
function rnd(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }
function coin(p=0.5) { return Math.random() < p; }
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function money(n) { return n.toLocaleString(); }

function energyClass(e) {
  if(e >= 60) return 'good';
  if(e >= 30) return 'warn';
  return 'danger';
}
function beerClass(b) {
  if(b >= 4) return 'good';
  if(b >= 2) return 'warn';
  return 'danger';
}

// ============================================================
//  OUTPUT
// ============================================================
const out = document.getElementById('output');

function print(text='', cls='') {
  const d = document.createElement('div');
  d.className = 'line' + (cls ? ' '+cls : '');
  d.innerHTML = text;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

function printBlank() { print('&nbsp;'); }

function printBar(label, val, max, color='#00ff41', warnColor='#ffaa00', dangerColor='#ff3333') {
  const pct = Math.min(100, Math.max(0, Math.round((val/max)*100)));
  const filled = Math.round(pct/4);
  const empty = 25-filled;
  const c = pct >= 60 ? color : pct >= 30 ? warnColor : dangerColor;
  const bar = `<span style="color:${c}">${'█'.repeat(filled)}</span><span style="color:#222">${'░'.repeat(empty)}</span>`;
  print(`  ${label.padEnd(14)} [${bar}] ${pct}%`);
}

function updateStatus() {
  document.getElementById('s-week').textContent = G.week;
  document.getElementById('s-total').textContent = G.totalWeeks;
  document.getElementById('s-money').textContent = money(G.money);

  const beerEl = document.getElementById('s-beer');
  beerEl.textContent = G.budLights;
  beerEl.className = G.budLights <= 2 ? 'flash-danger' : beerClass(G.budLights);

  const enEl = document.getElementById('s-energy');
  enEl.textContent = G.energy;
  enEl.className = G.energy <= 20 ? 'flash-danger' : energyClass(G.energy);

  const rallyEl = document.getElementById('s-rally');
  rallyEl.textContent = G.rallyPrep;
  rallyEl.className = G.rallyPrep >= 80 ? 'good' : G.rallyPrep >= 50 ? 'warn' : '';

  document.getElementById('s-inv').textContent = G.inventory.length;
}

// ============================================================
//  MARKETPLACE LISTINGS GENERATOR
// ============================================================
function roundPrice(p) {
  if(p >= 1000) return Math.round(p / 100) * 100;
  return Math.round(p / 10) * 10;
}

function generateListings() {
  G.listings = [];
  const count = 4;
  const pool = [...ITEMS];
  // shuffle
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  // rare chance for recalled yeti (ramps up after week 2)
  const recallChance = G.week >= 2 ? Math.min(0.40, 0.08 + (G.week-2)*0.10) : 0;
  let addedRecall = false;
  if(!G.foundRecalled && Math.random() < recallChance) {
    addedRecall = true;
  }

  for(let i=0;i<Math.min(count, pool.length);i++) {
    const item = pool[i];
    const askPrice = roundPrice(rnd(item.buyMin, item.buyMax));
    const conditions = ['runs great','needs some TLC','one careful owner','wife said get rid of it',
      'motivated seller','priced to move','barely used','stored in garage','has a few scratches',
      'serious inquiries only','cash only','no lowballers I know what I have',
      'just needs a little work','selling for a friend','upgrading, gotta go',
      'ran when parked','like new condition','some rust but solid','never used',
      'kids grew up, no longer needed','moving, must sell','priced below market'];
    G.listings.push({
      ...item,
      askPrice,
      condition: pick(conditions),
      seller: pick(['DaveM','BobR','SteveW','Mike_T','JohnnyB','TerryK','ChuckD','RandyP',
        'GaryL','PhilH','KevinS','BradT','LarryM','ScottW','MikeD','CraigsList_Mike',
        'BigSteve','ToddR','DennisK','RonaldP','PeteC'])
    });
  }

  if(addedRecall) {
    const askPrice = roundPrice(rnd(RECALLED_YETI.buyMin, RECALLED_YETI.buyMax));
    G.listings.splice(rnd(0,G.listings.length), 0, {
      ...RECALLED_YETI,
      askPrice,
      condition: 'has a weird magnetic lid thing, not sure what that is',
      seller: pick(['DaveM','BobR','SteveW','CraigsList_Mike'])
    });
  }
}

// ============================================================
//  POST-ACTION HELPER
// ============================================================
function afterAction() {
  G.actionsTaken++;
  updateStatus();

  // Energy = 0 → sober game over
  if(G.energy <= 0 && G.phase === 'playing') {
    soberGameOver();
    return;
  }

  // Passive bite meter creep — each action taken while Griffin is already barking
  if(G.pendingEvent && G.pendingEvent.type === 'griffin') {
    G.biteMeter = Math.min(100, G.biteMeter + rnd(3, 6));
    if(G.biteMeter >= 35) {
      print(`  🐕 ⚠️  Griffin is still going. Bite risk: ${G.biteMeter}%. Select <strong>calm</strong>.`, G.biteMeter >= 60 ? 'error' : 'event');
    }
    if(Math.random() < G.biteMeter / 450) { griffinBiteGameOver(); return; }
  }

  // Unanswered rally question bleeds prep
  if(G.pendingEvent && G.pendingEvent.type === 'rally') {
    const bleed = rnd(2, 5);
    G.rallyPrep = Math.max(0, G.rallyPrep - bleed);
    print(`  📱 That rally question is still sitting there. Prep -${bleed}%. Select <strong>answer</strong>.`, 'event');
  }

  // Prep reminder when behind
  if(G.week >= 2 && G.rallyPrep < 45 && G.actionsTaken % 4 === 0) {
    printBlank();
    print('  ⚠️  Reminder: rally prep is at ' + G.rallyPrep + '%. Select <strong>prep</strong> to work on it.', 'event');
  }

  rollRandomEvent();
  if(G.pendingEvent) {
    if(G.pendingEvent.type === 'griffin') triggerGriffinEvent();
    else if(G.pendingEvent.type === 'tswam') triggerTSwanEvent();
    else triggerRallyEvent();
  }

  // Auto-advance week after maxActionsPerWeek actions with no blocking event
  if(G.actionsTaken >= G.maxActionsPerWeek && !G.pendingEvent && G.phase === 'playing') {
    printBlank();
    print('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'dim');
    print('  📅 Week ' + G.week + ' done. Matt calls it. Auto-advancing...', 'dim');
    setTimeout(() => cmdNext(), 900);
  }
}

// ============================================================
//  RANDOM EVENTS
// ============================================================
function redFlash() {
  document.body.classList.remove('red-flash-mode');
  void document.body.offsetWidth;
  document.body.classList.add('red-flash-mode');
  setTimeout(() => document.body.classList.remove('red-flash-mode'), 1200);
}

function rollRandomEvent() {
  if(G.pendingEvent) return; // already have one

  // Crockett: once per game, starts firing after action 4
  if(!G.crockettSeen && G.actionsTaken >= 2 && G.actionsTaken <= 7 && G.week >= 2 && G.week <= 4 && Math.random() < 0.055) {
    G.crockettSeen = true;
    const shift = coin() ? 1 : -1;
    const oldWeek = G.week;
    G.week = Math.max(1, Math.min(G.totalWeeks, G.week + shift));
    G.weeklyPrepGained = 0;
    drunkFlash();
    printBlank();

function cmdNegotiate(idx, isLowball) {
  if(G.listings.length === 0) {
    print('No listings loaded. Select <strong>browse</strong> first.', 'error');
    return;
  }
  const i = parseInt(idx) - 1;
  if(isNaN(i) || i < 0 || i >= G.listings.length) {
    print(`Invalid listing. Choose 1-${G.listings.length}.`, 'error');
    return;
  }
  const item = G.listings[i];
  const energyCost = isLowball ? 20 : 10;

  if(G.energy < energyCost) {
    print(`Not enough energy (need ${energyCost}). Drink a Bud Light.`, 'error');
    return;
  }

  // Calculate offer price
  let offerPct, successChance;
  if(isLowball) {
    offerPct = rnd(40, 55) / 100;
    successChance = 0.20; // exactly 1 in 5
  } else {
    // negotiate: 78-93% of asking; odds scale with closeness to asking
    offerPct = rnd(78, 93) / 100;
    // 78% offer → ~45% success, 93% offer → ~82% success
    successChance = 0.45 + ((offerPct - 0.78) / 0.15) * 0.37;
    // cash-to-asking ratio: nearly broke = desperation bonus, flush with cash = slight penalty
    const cashRatio = G.money / item.askPrice;
    const cashMod = cashRatio < 1.3 ? 0.22 : cashRatio < 2 ? 0.10 : cashRatio < 5 ? 0 : -0.12;
    successChance = Math.min(0.95, Math.max(0.15, successChance + cashMod));
  }

  const offerPrice = Math.min(G.money, roundPrice(Math.round(item.askPrice * offerPct)));

  G.energy = Math.max(0, G.energy - energyCost);

  const accepted = Math.random() < successChance;

  printBlank();
  if(isLowball) {
    const openers = [
      `Matt slides on over and offers $${money(offerPrice)}. The seller goes quiet.`,
      `Matt, Kirkland slides shuffling: "$${money(offerPrice)}. Cash. Today. Final."`,
      `Matt puts in $${money(offerPrice)} and waits. Griffin barks distantly for moral support.`,
    ];
    print(`  🤝 ${pick(openers)}`, 'event');
  } else {
    const openers = [
      `Matt counters at $${money(offerPrice)}.`,
      `Matt: "How about $${money(offerPrice)}? Cash, today."`,
      `Matt offers $${money(offerPrice)} and waits with a Bud Light in hand.`,
    ];
    print(`  🤝 ${pick(openers)}`, 'event');
  }
  print(`     Asking: $${money(item.askPrice)} → Your offer: $${money(offerPrice)} (${Math.round(offerPct*100)}% of asking)`, 'dim');
  printBlank();

  if(accepted) {
    G.money -= offerPrice;
    G.inventory.push({ ...item, paidPrice: offerPrice });
    G.listings.splice(i, 1);
    const savings = item.askPrice - offerPrice;

    const accepts = isLowball
      ? [`Seller: "...Fine. Just come get it."`,
         `Seller: "Ugh. Yeah. Cash only."`,
         `Seller: "My wife is going to kill me. Deal."`,
         `Seller: "You know what, I just want it gone. Fine."`]
      : [`Seller: "Alright, deal."`,
         `Seller: "Yeah I can do that. Come pick it up."`,
         `Seller: "Fair enough. You got it."`,
         `Seller: "Works for me. Cash at pickup."`];
    print(`  ✅ ${pick(accepts)}`, 'money');
    print(`  Paid: $${money(offerPrice)} | Saved: $${money(savings)} off asking`, 'money');
    if(isLowball) print(`  Matt is driving home absolutely beaming. ${G.currentSong} at full volume.`, 'special');
  } else {
    const rejects = isLowball
      ? [`Seller: "LOL. No."`,
         `Seller: "Are you serious right now."`,
         `Seller: "I know what I have. Goodbye."`,
         `Seller: "Please don't contact me again."`,
         `Seller has left the conversation.`]
      : [`Seller: "I can't go that low, sorry."`,
         `Seller: "No, I need closer to asking."`,
         `Seller: "I'll pass. Thanks anyway."`,
         `Seller: "Hmm. No. But thanks."`];
    print(`  ❌ ${pick(rejects)}`, 'error');
    if(isLowball) {
      print(`  Seller blocked Matt. Listing gone. (-8 energy, that stings.)`, 'dim');
      G.energy = Math.max(0, G.energy - 8);
      G.listings.splice(i, 1);
    } else {
      print(`  Listing still available at $${money(item.askPrice)} if you change your mind.`, 'dim');
    }
  }

  afterAction();
}

const GARBAGE_PICK_ITEMS = [
  { id:'old_tv',  name:'CRT TV (works fine)',          emoji:'📺', paidPrice:0, sellMin:20,  sellMax:80  },
  { id:'bike',    name:'Bicycle (needs air)',           emoji:'🚲', paidPrice:0, sellMin:30,  sellMax:120 },
  { id:'weights', name:'Dumbbell Set (incomplete)',     emoji:'🏋️', paidPrice:0, sellMin:15,  sellMax:60  },
  { id:'fan',     name:'Box Fan (works)',               emoji:'💨', paidPrice:0, sellMin:10,  sellMax:40  },
  { id:'toolbox', name:'Misc Tool Box',                 emoji:'🔧', paidPrice:0, sellMin:25,  sellMax:100 },
  { id:'chair',   name:'Office Chair (decent shape)',  emoji:'💺', paidPrice:0, sellMin:20,  sellMax:90  },
];

function cmdScoot() {
  if(G.week < 2) {
    print('  The Razz is in the garage but Matt\'s not feeling the scoot yet.', 'dim');
    print('  Check back in Week 2.', 'dim');
    return;
  }
  if(G.energy < 10) {
    print('  Matt can barely stand. Drink a Bud Light before scooting.', 'error');
    return;
  }
  G.energy = Math.max(0, G.energy - 10);
  printBlank();
  print('  🛵 Matt fires up the Razz and rolls out onto Iris Drive.', 'system');
  print('  Basketball shorts flapping. Kirkland slides firm on the pegs.', 'dim');
  printBlank();
  const scootRoll = Math.random();
  if(scootRoll < 0.14) {
    const found = { ...pick(GARBAGE_PICK_ITEMS) };
    G.inventory.push(found);
    print('  He spots a pile of stuff at the curb. Neighbor\'s doing a cleanout.', 'dim');
    print(`  Matt eyeballs the ${found.name}. Looks at it. Looks at his phone.`, 'dim');
    print('  Loads it onto the Razz somehow. Science cannot explain how.', 'dim');
    print(`  🎁 GARBAGE PICKED: ${found.emoji} ${found.name}`, 'money');
    print(`  Free inventory. Est. sell: $${money(found.sellMin)}–$${money(found.sellMax)}`, 'money');
  } else if(scootRoll < 0.28) {
    const gain = rnd(20, 40);
    G.energy = Math.min(100, G.energy + gain);
    print('  Perfect ride. Cool breeze. Smooth pavement all the way around the block.', 'dim');
    print('  Matt comes back weirdly refreshed. The Razz has healing properties.', 'dim');
    print(`  ⚡ Energy +${gain} (${G.energy}% total)`, 'money');
  } else if(scootRoll < 0.42) {
    const found = rnd(5, 30);
    G.money += found;
    print('  Matt spots something on the edge of Maple Ave. Reaches down at speed.', 'dim');
    print('  A folded-up bill. He doesn\'t stop to count it until he gets home.', 'dim');
    print(`  💰 Found $${found} on the street. The Razz pays for itself.`, 'money');
  } else if(scootRoll < 0.56) {
    const lostBeers = rnd(1, 2);
    G.budLights = Math.max(0, G.budLights - lostBeers);
    print('  Matt cuts a corner too fast near the Hendersons\' driveway.', 'dim');
    print(`  Speed bump. ${lostBeers} Bud Light${lostBeers > 1 ? 's' : ''} eject off the back rack.`, 'dim');
    print('  They shatter immediately. Griffin, watching from the yard, does not help.', 'griffin');
    print(`  🍺 Lost ${lostBeers} Bud Light${lostBeers > 1 ? 's' : ''}.`, 'error');
  } else if(scootRoll < 0.68) {
    const drain = rnd(10, 20);
    G.energy = Math.max(0, G.energy - drain);
    print('  Matt takes the long way through the hill side. Lots of uphill.', 'dim');
    print('  Way more uphill than expected. The Razz is not a mountain vehicle.', 'dim');
    print('  Matt arrives home out of breath, rethinking several decisions.', 'dim');
    print(`  ⚡ Energy -${drain} (${G.energy}% remaining)`, 'error');
  } else if(scootRoll < 0.82) {
    const prepGain = rnd(3, 9);
    G.rallyPrep = Math.min(100, G.rallyPrep + prepGain);
    print('  Matt cruises past the lake access and scopes out the dock situation.', 'dim');
    print('  Looks good. Really good. He texts the boat rally group chat from the Razz.', 'dim');
    print('  Still moving. No helmet. Slides on. Full send.', 'dim');
    print(`  🎉 Rally Prep +${prepGain}% (${G.rallyPrep}% total)`, 'rally');
  } else {
    const lost = rnd(10, 40);
    G.money = Math.max(0, G.money - lost);
    print('  Matt nearly clips a neighbor walking their golden retriever.', 'dim');
    print('  Classic near-miss on Iris Drive. The Razz stops with one inch to spare.', 'dim');
    print(`  Matt offers $${lost} as an apology. The neighbor accepts without hesitation.`, 'dim');
    print(`  💸 -$${lost} (neighborly relations maintained)`, 'error');
  }
  printBlank();
  updateStatus();
  afterAction();
}

// ============================================================
//  BUTTON PANEL
// ============================================================
let btnCtx = { mode: 'default', selectedListing: null };

function addBtn(panel, label, cmd, cls, clickFn) {
  const b = document.createElement('button');
  b.className = 'game-btn' + (cls ? ' ' + cls : '');
  b.innerHTML = label;
  b.addEventListener('click', function(e) {
    e.stopPropagation();
    if (clickFn) { clickFn(); return; }
    if (cmd) processCommand(cmd);
  });
  panel.appendChild(b);
}

function renderButtons() {
  const panel = document.getElementById('btn-panel');
  if (!panel) return;
  panel.innerHTML = '';

  if (G.phase === 'over') return;

  // Pending events take full priority
  if (G.pendingEvent) {
    const e = G.pendingEvent;
    if (e.type === 'griffin') {
      addBtn(panel, '🐕 CALM GRIFFIN', 'calm', 'btn-event');
      addBtn(panel, '🙈 IGNORE (risky)', 'ignore-griffin', 'btn-back');
    } else if (e.type === 'tswam') {
      addBtn(panel, '🤝 DEAL WITH T-SWAN', 'deal', 'btn-event');
      addBtn(panel, '🙈 IGNORE (risky)', 'ignore-tswan', 'btn-back');
    } else if (e.type === 'fireworks') {
      e.opts.forEach((idx, i) => {
        addBtn(panel, `ANSWER ${i+1}`, `answer ${i+1}`, 'btn-choice');
      });
    } else if (e.type === 'rally') {
      addBtn(panel, '📱 ANSWER', 'answer', 'btn-choice');
    }
    return;
  }

  // Listing-action sub-mode: pick buy / negotiate / lowball for a specific item
  if (btnCtx.mode === 'listing-action' && btnCtx.selectedListing !== null) {
    const item = G.listings[btnCtx.selectedListing];
    if (item) {
      const n = btnCtx.selectedListing + 1;
      const minLowball = Math.round(item.askPrice * 0.40);
      if (G.money >= minLowball) {
        // Only show higher-tier options if actually affordable
        if (G.money >= item.askPrice)
          addBtn(panel, `💰 BUY  $${money(item.askPrice)}`, `buy ${n}`, 'btn-buy');
        const minNegotiate = Math.round(item.askPrice * 0.78);
        if (G.money >= minNegotiate)
          addBtn(panel, `🤝 NEGOTIATE (~$${money(minNegotiate)}+)`, `negotiate ${n}`, 'btn-negotiate');
        addBtn(panel, `📉 LOWBALL (~$${money(minLowball)}+)`, `lowball ${n}`, 'btn-lowball');
      }
      // If can't afford to lowball, no action buttons — just back
      addBtn(panel, '← BACK', null, 'btn-back', () => {
        btnCtx.mode = 'listings'; btnCtx.selectedListing = null; renderButtons();
      });
      return;
    }
    // Item was removed, fall through to listings
    btnCtx.mode = 'listings'; btnCtx.selectedListing = null;
  }

  // Listings mode: only show items you can at least lowball
  if (btnCtx.mode === 'listings' && G.listings.length > 0) {
    G.listings.forEach((item, i) => {
      if (G.money < Math.round(item.askPrice * 0.40)) return;
      addBtn(panel, `${item.emoji} ${item.name}  $${money(item.askPrice)}`, null, 'btn-listing', () => {
        btnCtx.mode = 'listing-action';
        btnCtx.selectedListing = i;
        renderButtons();
      });
    });
    addBtn(panel, '← BACK', null, 'btn-back', () => {
      btnCtx.mode = 'default'; renderButtons();
    });
    return;
  }

  // More mode: all options + back
  if (btnCtx.mode === 'more') {
    addBtn(panel, '🔍 BROWSE', 'browse', 'btn-primary');
    if (G.inventory.length > 0) addBtn(panel, '💸 SELL ALL', 'sell', 'btn-sell');
    if (G.budLights > 0)        addBtn(panel, '🍺 RECHARGE', 'recharge', 'btn-beer');
                                addBtn(panel, '🏪 RESTOCK', 'restock', '');
                                addBtn(panel, '📋 PREP', 'prep', '');
    if (G.week >= 2)            addBtn(panel, '🛴 SCOOT', 'scoot', '');
                                addBtn(panel, '📊 STATUS', 'status', '');
                                addBtn(panel, '📦 INVENTORY', 'inventory', '');
                                addBtn(panel, '🎉 RALLY', 'rally', '');
    const hasYeti = G.inventory.some(i => i.id === 'yeti_recalled' && !i.upgraded);
    if (hasYeti)                addBtn(panel, '🧊 UPGRADE YETI', 'upgrade', 'btn-sell');
                                addBtn(panel, '← BACK', null, 'btn-back', () => {
                                  btnCtx.mode = 'default'; renderButtons();
                                });
    return;
  }

  // Default mode
  addBtn(panel, '🔍 BROWSE', 'browse', 'btn-primary');
  if (G.inventory.length > 0) addBtn(panel, '💸 SELL ALL', 'sell', 'btn-sell');
  if (G.budLights > 0)        addBtn(panel, '🍺 RECHARGE', 'recharge', 'btn-beer');
  if (G.budLights <= 3)       addBtn(panel, '🏪 RESTOCK', 'restock', '');
                              addBtn(panel, '📋 PREP', 'prep', '');
  if (G.week >= 2)            addBtn(panel, '🛴 SCOOT', 'scoot', '');
  const hasYetiDefault = G.inventory.some(i => i.id === 'yeti_recalled' && !i.upgraded);
  if (hasYetiDefault)         addBtn(panel, '🧊⭐ UPGRADE YETI', 'upgrade', 'btn-upgrade');
                              addBtn(panel, '⋯ MORE', null, 'btn-next', () => {
                                btnCtx.mode = 'more'; renderButtons();
                              });
}

function processCommand(raw) {
  const input = raw.trim();
  if(!input) return;

  // Echo command
  print(`&gt; ${input}`, 'prompt-echo');

  if(G.phase === 'over') {
    print('The summer is over. Refresh to play again.', 'dim');
    return;
  }

  const parts = input.toLowerCase().split(/\s+/);
  const cmd = parts[0];
  const arg = parts.slice(1).join(' ');

  // T-Swan is pending — anything other than deal loses the day
  if(G.pendingEvent && G.pendingEvent.type === 'tswam') {
    if(!['deal','tswan','t-swan','tswam'].includes(cmd)) {
      cmdNext(); // cmdNext has the lost-week narrative + week advance
      return;
    }
  }

  switch(cmd) {
    case 'help': case 'h': case '?':
      cmdHelp(); break;
    case 'browse': case 'scroll': case 'b': case 'marketplace': case 'fb': case 'search':
      cmdBrowse(); break;
    case 'buy': case 'purchase': case 'get':
      cmdBuy(arg); break;
    case 'negotiate': case 'counter': case 'offer':
      cmdNegotiate(arg, false); break;
    case 'lowball': case 'lb': case 'lowbll':
      cmdNegotiate(arg, true); break;
    case 'sell': case 's':
      cmdSell(arg); break;
    case 'inventory': case 'inv': case 'i': case 'items': case 'garage':
      cmdInventory(); break;
    case 'recharge': case 'drink': case 'crack': case 'beer': case 'bud': case 'fuel':
      cmdDrink(); break;
    case 'restock': case 'costco': case 'beer-run':
      cmdRestock(); break;
    case 'status': case 'stats': case 'me': case 'matt':
      cmdStatus(); break;
    case 'deal': case 'tswan': case 't-swan': case 'tswam':
      cmdDeal(); break;
    case 'ignore-griffin': cmdIgnoreGriffin(); break;
    case 'ignore-tswan':   cmdIgnoreTSwan();   break;
    case 'upgrade': case 'yeti':
      cmdUpgrade(); break;
    case 'truelime':
      if(!G.trueLimeUsed) {
        G.trueLimeUsed = true;
        G.money += 420;
        printBlank();
        print('  🟢 ...huh.', 'special');
        print('  $420 appeared in Matt\'s pocket.', 'money');
        print('  He doesn\'t question it. The slides stay on.', 'dim');
        updateStatus();
      } else {
        print('  Already squeezed.', 'dim');
      }
      break;
    case 'scoot': case 'razz': case 'ride':
      cmdScoot(); break;
    case 'developer': case 'dev': case 'debug':
      cmdDeveloper(); break;
    case 'calm': case 'quiet': case 'griffin': case 'griff': case 'dog':
      cmdCalm(); break;
    case 'answer': case 'reply': case 'respond': case 'text': case 'ans':
      cmdAnswer(arg); break;
    case 'rally': case 'event': case 'boat': case 'boatrally':
      cmdRally(); break;
    case 'prep': case 'organize': case 'plan': case 'work':
      cmdPrep(); break;
    case 'next': case 'sleep': case 'week': case 'n': case 'end': case 'done':
      cmdNext(); break;
    default:
      const unknowns = [
        `Unknown command: "${input}". Select <strong>help</strong>.`,
        `Matt looked up from his phone. "What?"`,
        `${input}? Not a thing. Try <strong>help</strong>.`,
        `Griffin barked in confusion.`,
        `The Ying Yang Twins could not be reached for comment on this command.`,
      ];
      print(pick(unknowns), 'error');
  }

  // Update button context based on what command ran
  const _browseAliases = ['browse','scroll','b','marketplace','fb','search'];
  const _buyAliases    = ['buy','purchase','get','negotiate','counter','offer','lowball','lb','lowbll'];
  if (_browseAliases.includes(cmd)) {
    btnCtx = { mode: 'listings', selectedListing: null };
  } else if (_buyAliases.includes(cmd)) {
    btnCtx = { mode: G.listings.length > 0 ? 'listings' : 'default', selectedListing: null };
  } else {
    btnCtx = { mode: 'default', selectedListing: null };
  }
  renderButtons();
}

let ytLoaded = false;
function loadYT() {
  if(ytLoaded) return;
  ytLoaded = true;
  document.getElementById('yt-frame').src =
    'https://www.youtube.com/embed/bls9j98gFRw?autoplay=1&rel=0';
}
function toggleYT() {
  const dock = document.getElementById('yt-dock');
  if(!ytLoaded) {
    loadYT();
    dock.classList.remove('collapsed');
    document.getElementById('yt-label').textContent = '🎵 SOUNDTRACK ▼';
    return;
  }
  const collapsed = dock.classList.toggle('collapsed');
  document.getElementById('yt-label').textContent =
    collapsed ? '🎵 SOUNDTRACK ▶' : '🎵 SOUNDTRACK ▼';
}
// Try autoplay immediately; fall back to first button click
loadYT();
document.addEventListener('click', loadYT, { once: true });


const COMMANDS = ['browse','buy','sell','negotiate','lowball','recharge','drink','restock','calm','deal','upgrade','prep','rally','status','next','inventory','help','answer','truelime','scoot','developer'];

const inputEl = document.getElementById('cmd-input');
inputEl.addEventListener('keydown', function(e) {
  if(e.key === 'Tab') {
    e.preventDefault();
    const val = inputEl.value.toLowerCase().trim();
    if(!val) return;
    const match = COMMANDS.find(c => c.startsWith(val));
    if(match) inputEl.value = match + ' ';
    return;
  }
  if(e.key === 'Enter') {
    const val = inputEl.value;
    inputEl.value = '';
    processCommand(val);
  }
});
